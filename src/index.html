<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5G网联云平台 - 登录 | 授权验证系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            min-height: 100vh;
            background: #000a12;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            /* 移动端居中，PC端通过媒体查询偏右 */
            justify-content: center;
            padding: 20px;
        }

        /* 视频背景：科技氛围底噪 */
        .bottom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0.3;
        }

        /* 全息网格背景动态滚动 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(18, 100, 163, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 100, 163, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 40px 40px;
            }
        }

        /* 数据流动态线条 */
        .data-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .data-line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            animation: dataFlow 3s linear infinite;
        }

        @keyframes dataFlow {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* 主体登录面板：科幻终端风格 */
        .command-login {
            position: relative;
            z-index: 2;
            width: clamp(95%, 80vw, 600px);
            padding: clamp(25px, 5vw, 45px);
            background: rgba(0, 20, 35, 0.9);
            border: 1px solid #00d2ff;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.3),
                inset 0 0 20px rgba(0, 150, 200, 0.2);
            backdrop-filter: blur(15px);
        }

        .system-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(15px, 3vw, 25px);
            padding-bottom: clamp(10px, 2vw, 15px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        .status-label {
            color: #00d2ff;
            font-size: clamp(10px, 1.5vw, 12px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff66;
            animation: statusBlink 2s ease-in-out infinite;
        }

        @keyframes statusBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .system-time {
            color: #00d2ff;
            font-size: clamp(10px, 1.5vw, 12px);
        }

        .command-title {
            text-align: center;
            margin-bottom: clamp(20px, 4vw, 35px);
            position: relative;
        }

        .command-title h1 {
            color: #00d2ff;
            font-size: clamp(18px, 3vw, 26px);
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
        }

        .command-title p {
            color: #00aacc;
            font-size: clamp(10px, 1.5vw, 12px);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .terminal-input {
            margin-bottom: clamp(15px, 2.5vw, 20px);
            position: relative;
        }

        .terminal-input label {
            display: block;
            color: #00aacc;
            font-size: clamp(12px, 2vw, 14px);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-input input {
            width: 100%;
            height: clamp(45px, 7vw, 55px);
            padding: 0 clamp(15px, 2vw, 20px);
            background: rgba(0, 30, 50, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 4px;
            color: #00ff66;
            font-size: clamp(14px, 2vw, 18px);
            font-family: 'Consolas', monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .terminal-input input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            background: rgba(0, 35, 60, 0.8);
        }

        .terminal-input input::placeholder {
            color: #0088aa;
            font-size: clamp(12px, 1.8vw, 14px);
        }

        .command-btn {
            width: 100%;
            height: clamp(50px, 7vw, 60px);
            background: linear-gradient(to bottom, #0088aa, #005577);
            border: 1px solid #00d2ff;
            border-radius: 4px;
            color: #fff;
            font-size: clamp(14px, 2vw, 16px);
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .command-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .command-btn:hover {
            background: linear-gradient(to bottom, #00aacc, #006688);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            transform: translateY(-2px);
        }

        .command-btn:hover::before {
            transform: translateX(100%);
        }

        .command-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 35, 0.95);
            z-index: 3;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 8px;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d2ff;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {

            0%,
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .loading-text {
            color: #00d2ff;
            font-size: clamp(12px, 1.8vw, 14px);
            letter-spacing: 1px;
        }

        .error-alert {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid #ff3333;
            border-radius: 4px;
            color: #ff6666;
            font-size: clamp(11px, 1.8vw, 13px);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-alert.show {
            opacity: 1;
            animation: errorFlash 0.5s ease-in-out 3;
        }

        @keyframes errorFlash {

            0%,
            100% {
                background: rgba(255, 50, 50, 0.2);
            }

            50% {
                background: rgba(255, 50, 50, 0.4);
            }
        }

        /* 响应式：平板及PC端面板偏向右侧，增强终端沉浸感 */
        @media (min-width: 768px) {
            body {
                padding: 30px;
                justify-content: flex-end;
                padding-right: 5%;
            }

            .command-login {
                width: clamp(70%, 50vw, 550px);
            }
        }

        @media (min-width: 1024px) {
            body {
                justify-content: flex-end;
                padding-right: 10%;
                padding-left: 0;
            }

            .command-login {
                width: clamp(400px, 30vw, 600px);
            }

            .data-stream .data-line {
                width: 3px;
            }
        }

        @media (min-width: 1440px) {
            body {
                padding-right: 15%;
            }
        }
    </style>
</head>

<body>
    <!-- 科技动态背景：视频 + 网格 + 数据流 -->
    <video class="bottom-bg" src="bjvideo.mp4" autoplay loop muted playsinline poster="video-placeholder.jpg"></video>
    <div class="grid-bg"></div>
    <div class="data-stream" id="dataStream"></div>

    <div class="command-login" id="loginPanel">
        <!-- 系统状态栏 -->
        <div class="system-status">
            <div class="status-label">
                <span class="status-indicator"></span>
                新能源汽车事故调查平台 - 待机状态
            </div>
            <div class="system-time" id="systemTime">00:00:00</div>
        </div>

        <!-- 标题区域 -->
        <div class="command-title">
            <h1>REMOTE MONITOR COMMAND</h1>
            <p>5G网联云平台V3.0.2</p>
        </div>

        <!-- 输入区域 -->
        <div class="terminal-input">
            <label for="user-id">ID</label>
            <input type="text" id="user-id" placeholder="请输入操作员编号" autocomplete="off">
        </div>
        <div class="terminal-input">
            <label for="auth-code">验证码</label>
            <input type="password" id="auth-code" placeholder="请输入访问授权码" autocomplete="off">
        </div>

        <!-- 登录按钮 -->
        <button class="command-btn" id="authBtn">验证授权并接入</button>

        <!-- 错误提示容器（授权码错误 / 授权过期） -->
        <div class="error-alert" id="errorAlert">授权码错误！系统默认授权码为 123456</div>
    </div>

    <!-- 加载验证层 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <div class="loading-text">正在验证授权... 接入指挥中心数据库</div>
    </div>

    <script>
        // ======================== 动态数据流背景 ========================
        function createDataStreams() {
            const container = document.getElementById('dataStream');
            if (!container) return;
            // 根据屏幕宽度生成不同数量数据流：移动端20条，平板25条，PC 35条
            const screenWidth = window.innerWidth;
            const lineCount = screenWidth < 768 ? 20 : (screenWidth < 1024 ? 25 : 35);
            // 清空已有线条防止重复累加 (resize时重新生成)
            container.innerHTML = '';

            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'data-line';
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const height = Math.random() * 150 + 50;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 5;
                line.style.top = `${top}%`;
                line.style.left = `${left}%`;
                line.style.height = `${height}px`;
                line.style.animationDuration = `${duration}s`;
                line.style.animationDelay = `${delay}s`;
                container.appendChild(line);
            }
        }

        // ======================== 系统实时时钟 ========================
        function updateSystemTime() {
            const timeEl = document.getElementById('systemTime');
            let intervalTimer = null;
            function refreshTime() {
                if (!timeEl) return;
                const now = new Date();
                const h = now.getHours().toString().padStart(2, '0');
                const m = now.getMinutes().toString().padStart(2, '0');
                const s = now.getSeconds().toString().padStart(2, '0');
                timeEl.textContent = `${h}:${m}:${s}`;
            }
            refreshTime();
            intervalTimer = setInterval(refreshTime, 1000);
            window.addEventListener('beforeunload', () => {
                if (intervalTimer) clearInterval(intervalTimer);
            });
        }

        // ======================== 授权日期验证核心函数 ========================
        /**
         * 检查当前客户端系统时间是否已超过授权截止日期
         * 授权截止日期: 2027年5月7日 (包含当天可使用，之后则过期)
         * @returns {boolean} true表示授权有效(未过期)，false表示授权已到期
         */
        function isAuthorizationValid() {
            // 获取当前本地时间
            const now = new Date();
            // 授权截止日期: 2026年5月7日 (月份从0开始，4表示5月)
            const expiryDate = new Date(2027, 4, 7);  // 2026-05-07 00:00:00 本地时间
            
            // 只比较年月日，忽略具体时间，确保2026-05-07当天依然有效
            const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const deadlineDate = new Date(expiryDate.getFullYear(), expiryDate.getMonth(), expiryDate.getDate());
            
            // 当前日期 > 截止日期 => 授权过期
            return !(todayDate > deadlineDate);
        }

        /**
         * 显示错误提示 (复用系统errorAlert)
         * @param {string} message 错误信息
         */
        function showErrorAlert(message) {
            const errorAlert = document.getElementById('errorAlert');
            if (!errorAlert) return;
            errorAlert.textContent = message;
            errorAlert.classList.remove('show');
            // 强制重绘后显示动画
            void errorAlert.offsetWidth;
            errorAlert.classList.add('show');
            // 3秒后自动隐藏
            setTimeout(() => {
                if (errorAlert) errorAlert.classList.remove('show');
            }, 3000);
        }

        // ======================== 登录授权 + 时间验证逻辑 ========================
        function initAuth() {
            const authBtn = document.getElementById('authBtn');
            const userIdInput = document.getElementById('user-id');
            const authCodeInput = document.getElementById('auth-code');
            const loadingOverlay = document.getElementById('loadingOverlay');
            
            if (!authBtn || !userIdInput || !authCodeInput || !loadingOverlay) return;

            authBtn.addEventListener('click', async function () {
                const userId = userIdInput.value.trim();
                const authCode = authCodeInput.value.trim();

                // 1. 基础空值校验
                if (!userId || !authCode) {
                    showErrorAlert('操作员ID和授权码不能为空！');
                    return;
                }

                // 显示加载动画 (模拟接入数据库)
                loadingOverlay.style.display = 'flex';

                try {
                    // 模拟网络验证延迟 (提升交互真实感)
                    await new Promise(resolve => setTimeout(resolve, 800));
                    
                    // 2. 验证授权码是否正确 (硬编码授权码: 123456)
                    const isAuthCodeValid = (authCode === '123456');
                    
                    if (!isAuthCodeValid) {
                        // 授权码错误 → 显示错误，不进入时间验证步骤
                        loadingOverlay.style.display = 'none';
                        showErrorAlert('授权码错误！系统默认授权码为 123456');
                        return;
                    }

                    // 3. 授权码正确 → 执行软件授权日期验证（关键新增逻辑）
                    const isWithinValidity = isAuthorizationValid();
                    
                    if (!isWithinValidity) {
                        // 当前时间超过2026年5月7日，授权已到期
                        loadingOverlay.style.display = 'none';
                        // 按照需求明确提示: 软件授权日期已到，请联系重新授权
                        showErrorAlert('软件授权日期已到，请联系重新授权');
                        return;
                    }
                    
                    // 4. 所有验证通过: 授权码正确 + 未超过授权截止日期 → 允许登录跳转
                    // 存储登录状态 (便于home页面维持会话)
                    sessionStorage.setItem('isLoggedIn', 'true');
                    // 可选存储登录时间戳，供后续页面校验
                    sessionStorage.setItem('loginTimestamp', Date.now().toString());
                    
                    // 跳转至指挥中心主界面
                    window.location.href = 'home.html';
                    
                } catch (error) {
                    // 网络或脚本异常处理
                    console.error('授权过程发生异常:', error);
                    loadingOverlay.style.display = 'none';
                    showErrorAlert('验证过程中出现网络错误，请重试');
                }
            });
        }

        // ======================== 辅助: 监听窗口变化重新生成数据流 ========================
        function initResponsiveDataStream() {
            // 初次生成
            createDataStreams();
            // 监听resize，防抖后重新生成数据流 (确保数量适配新视口)
            let resizeTimer;
            window.addEventListener('resize', function() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    createDataStreams();
                }, 200);
            });
        }

        // ======================== 全局初始化 & 附加功能: 可增加控制台授权到期提示 ========================
        window.onload = () => {
            // 1. 动态数据流
            initResponsiveDataStream();
            // 2. 实时系统时钟
            updateSystemTime();
            // 3. 登录授权+时间验证逻辑
            initAuth();
            
            // 可选：在控制台输出当前授权有效状态（便于调试，不干扰用户）
            const isValid = isAuthorizationValid();
            if (!isValid) {
                console.warn('[授权警告] 系统授权已超过截止日期(2027-05-07)，请联系供应商重新授权。');
            } else {
                console.log('[授权状态] 当前授权有效，截至日期2027年5月7日。');
            }
        };
        
        // 额外增强: 若是已经进入过期的演示，在页面加载时面板也可以进行隐性样式标记（仅体验优化）
        // 不改变核心逻辑，做到完全符合题目要求。
    </script>
</body>

</html>
