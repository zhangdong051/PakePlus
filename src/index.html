<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尖兵远程监控指挥中心 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            min-height: 100vh;
            background: #000a12;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 新增最底层背景图片 */
        .bottom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('indexbgt.png');
            background-size: cover; /* 图片覆盖整个容器 */
            background-position: center; /* 图片居中 */
            background-repeat: no-repeat; /* 不重复平铺 */
            z-index: -1; /* 确保在所有背景元素下方 */
            opacity: 0.3; /* 可根据需要调整透明度 */
        }

        /* 全息网格背景 */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(18, 100, 163, 0.15) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(18, 100, 163, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridScroll 20s linear infinite;
        }

        /* 其他样式保持不变... */
        @keyframes gridScroll {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 40px 40px;
            }
        }

        .radar-scan {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 900px;
            border-radius: 50%;
            background: conic-gradient(transparent 0deg, rgba(58, 225, 27, 0.1) 1deg, transparent 3deg);
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: radarRotate 8s linear infinite;
            pointer-events: none;
        }

        @keyframes radarRotate {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .data-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .data-line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            animation: dataFlow 3s linear infinite;
        }

        @keyframes dataFlow {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .command-login {
            position: relative;
            z-index: 2;
            width: 500px;
            padding: 45px;
            background: rgba(0, 20, 35, 0.9);
            border: 1px solid #00d2ff;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.3),
                        inset 0 0 20px rgba(0, 150, 200, 0.2);
            backdrop-filter: blur(15px);
        }

        .system-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        .status-label {
            color: #00d2ff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff66;
            animation: statusBlink 2s ease-in-out infinite;
        }

        @keyframes statusBlink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .system-time {
            color: #00d2ff;
            font-size: 12px;
        }

        .command-title {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .command-title h1 {
            color: #00d2ff;
            font-size: 26px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.7);
        }

        .command-title p {
            color: #00aacc;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .terminal-input {
            margin-bottom: 20px;
            position: relative;
        }

        .terminal-input label {
            display: block;
            color: #00aacc;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-input input {
            width: 100%;
            height: 55px;
            padding: 0 20px;
            background: rgba(0, 30, 50, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 4px;
            color: #00ff66;
            font-size: 18px;
            font-family: 'Consolas', monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .terminal-input input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            background: rgba(0, 35, 60, 0.8);
        }

        .terminal-input input::placeholder {
            color: #0088aa;
            font-size: 14px;
        }

        .command-btn {
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #0088aa, #005577);
            border: 1px solid #00d2ff;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .command-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .command-btn:hover {
            background: linear-gradient(to bottom, #00aacc, #006688);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            transform: translateY(-2px);
        }

        .command-btn:hover::before {
            transform: translateX(100%);
        }

        .command-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 35, 0.95);
            z-index: 3;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 8px;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d2ff;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .loading-text {
            color: #00d2ff;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .error-alert {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid #ff3333;
            border-radius: 4px;
            color: #ff6666;
            font-size: 13px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-alert.show {
            opacity: 1;
            animation: errorFlash 0.5s ease-in-out 3;
        }

        @keyframes errorFlash {
            0%, 100% {
                background: rgba(255, 50, 50, 0.2);
            }
            50% {
                background: rgba(255, 50, 50, 0.4);
            }
        }

        @media (max-width: 550px) {
            .command-login {
                width: 92%;
                padding: 35px 25px;
            }
            .command-title h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 新增最底层背景图片元素 -->
    <div class="bottom-bg"></div>
    
    <div class="grid-bg"></div>
    <div class="radar-scan"></div>
    <div class="data-stream" id="dataStream"></div>

    <div class="command-login" id="loginPanel">
        <!-- 系统状态栏 -->
        <div class="system-status">
            <div class="status-label">
                <span class="status-indicator"></span>
                尖兵指挥中心系统 - 待机状态
            </div>
            <div class="system-time" id="systemTime">00:00:00</div>
        </div>

        <!-- 标题区域 -->
        <div class="command-title">
            <h1>REMOTE MONITOR COMMAND</h1>
            <p>远程监控指挥中心 V3.0.0</p>
        </div>

        <!-- 输入区域 -->
        <div class="terminal-input">
            <label for="user-id">操作员ID</label>
            <input type="text" id="user-id" placeholder="请输入操作员编号" autocomplete="off">
        </div>
        <div class="terminal-input">
            <label for="auth-code">授权码</label>
            <input type="password" id="auth-code" placeholder="请输入访问授权码" autocomplete="off">
        </div>

        <!-- 登录按钮 -->
        <button class="command-btn" id="authBtn">验证授权并接入</button>

        <!-- 错误提示 -->
        <div class="error-alert" id="errorAlert">授权码错误！系统默认授权码为 123456</div>
    </div>

    <!-- 加载验证层 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <div class="loading-text">正在验证授权... 接入指挥中心数据库</div>
    </div>

    <script>
        // 生成数据流光效
        function createDataStreams() {
            const container = document.getElementById('dataStream');
            const lineCount = 30;

            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'data-line';
                
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const height = Math.random() * 150 + 50;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 5;

                line.style.top = `${top}%`;
                line.style.left = `${left}%`;
                line.style.height = `${height}px`;
                line.style.animationDuration = `${duration}s`;
                line.style.animationDelay = `${delay}s`;

                container.appendChild(line);
            }
        }

        // 更新系统时间
        function updateSystemTime() {
            const timeEl = document.getElementById('systemTime');
            setInterval(() => {
                const now = new Date();
                const h = now.getHours().toString().padStart(2, '0');
                const m = now.getMinutes().toString().padStart(2, '0');
                const s = now.getSeconds().toString().padStart(2, '0');
                timeEl.textContent = `${h}:${m}:${s}`;
            }, 1000);
        }

        // 登录授权逻辑
        function initAuth() {
            const authBtn = document.getElementById('authBtn');
            const authCodeInput = document.getElementById('auth-code');
            const errorAlert = document.getElementById('errorAlert');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loginPanel = document.getElementById('loginPanel');

            // 点击授权按钮
            authBtn.addEventListener('click', () => {
                const authCode = authCodeInput.value.trim();
                if (!authCode) {
                    errorAlert.textContent = "请输入授权码！";
                    errorAlert.classList.add('show');
                    setTimeout(() => errorAlert.classList.remove('show'), 3000);
                    return;
                }

                // 显示加载层
                loadingOverlay.style.display = 'flex';

                // 模拟系统验证延迟
                setTimeout(() => {
                    if (authCode === '123456') {
                        // 授权成功，跳转主界面
                        window.location.href = '多设备2.0公网.html'; // 替换为实际主界面路径
                    } else {
                        // 授权失败，隐藏加载层并显示错误
                        loadingOverlay.style.display = 'none';
                        errorAlert.classList.add('show');
                        setTimeout(() => errorAlert.classList.remove('show'), 4000);
                    }
                }, 2000);
            });

            // 回车键触发授权
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') authBtn.click();
            });
        }

        // 页面加载初始化
        window.onload = () => {
            createDataStreams();
            updateSystemTime();
            initAuth();
        };
    </script>
</body>
</html>
