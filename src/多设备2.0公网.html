			// 使用指挥所坐标作为默认中心
			center: (() => {

                // 尝试从配置解析坐标
                const [lng, lat] = config.commandPostCoord.split(',').map(Number);
                // 验证坐标有效性
                if (isNaN(lng) || isNaN(lat)) {
                    throw new Error('Invalid coordinate');
                }
                return [lng, lat];
            } catch (error) {
                console.warn('使用默认地图中心坐标:', error);
                return [114.378185, 36.138881]; // 最终兜底默认值
            }
        })()
		}

// 切换视图模式并同步缩放状态
		function toggleViews() {
			const body = document.body;
			const isVideoMode = body.classList.contains('show-video-large');
			// 保存当前大窗口状态
			if (isVideoMode) {
				saveVideoState();
				applyMapState();
			} else {
				saveMapState();
				applyVideoState();
			}
			// 切换显示模式类
			body.classList.toggle('show-video-large');
			body.classList.toggle('show-map-large');

			// 同步小窗口内容
			syncSmallWindowContent();
		}
        // 保存视频窗口状态
        function saveVideoState() {
            windowState.video.zoom = 1;
        }

        // 应用视频窗口状态
        function applyVideoState() {
            const videoElement = document.getElementById('remote-video');
            if (videoElement) {
                videoElement.style.transform = `scale(${windowState.video.zoom})`;
            }
        }

        // 保存地图窗口状态
        function saveMapState() {
            if (window.largeMap) {
                windowState.map.zoom = window.largeMap.getZoom();
                windowState.map.center = window.largeMap.getCenter();
            }
        }

        // 应用地图窗口状态
        function applyMapState() {
            if (window.largeMap) {
                window.largeMap.setZoomAndCenter(
                    windowState.map.zoom,
                    windowState.map.center
                );
            }
        }

// 修改syncSmallWindowContent函数，确保小窗口状态正确
		function syncSmallWindowContent() {
			const isVideoMode = document.body.classList.contains('show-video-large');
			const activeVideo1 = document.body.classList.contains('active-video-1');
			const activeVideo2 = document.body.classList.contains('active-video-2');

			// 同步地图位置
			if (window.largeMap && window.smallMap) {
				window.smallMap.setZoomAndCenter(
					window.largeMap.getZoom(),
					window.largeMap.getCenter()
				);
			}

			// 视频模式下控制小窗口显示
			if (isVideoMode) {
				// 显示小地图
				document.getElementById('small-map-wrap').style.display = 'block';
				
				// 根据当前激活的大视频显示对应的小视频
				if (activeVideo1) {
					document.getElementById('small-remote-video-1').parentElement.parentElement.style.display = 'none';
					document.getElementById('small-remote-video-2').parentElement.parentElement.style.display = 'block';
				} else if (activeVideo2) {
					document.getElementById('small-remote-video-1').parentElement.parentElement.style.display = 'block';
					document.getElementById('small-remote-video-2').parentElement.parentElement.style.display = 'none';
				}
			} else {
				// 地图模式下显示所有小视频，隐藏小地图
				document.querySelectorAll('.video-small-view').forEach(el => {
					el.style.display = 'block';
				});
				document.getElementById('small-map-wrap').style.display = 'none';
			}
		}

            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
